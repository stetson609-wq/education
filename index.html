<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Sets | Quizlet</title>

<link rel="icon" href="https://quizlet.com/favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg:   #080909;
  --s1:   #0e0f10;
  --s2:   #141516;
  --s3:   #1c1d1e;
  --s4:   #242526;
  --e1:   #202122;
  --e2:   #2c2d2f;
  --e3:   #3a3b3d;
  --e4:   #484a4c;

  --t1:   #eeeeed;
  --t2:   #9fa09e;
  --t3:   #5c5d5b;
  --t4:   #333432;

  --sans:  'Instrument Sans', sans-serif;
  --serif: 'Instrument Serif', serif;
  --mono:  'JetBrains Mono', monospace;

  --out:    cubic-bezier(0.22, 1, 0.36, 1);
  --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
}

html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--t1);
  font-family: var(--sans);
  -webkit-font-smoothing: antialiased;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ── CANVAS ── */
#canvas {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  pointer-events: none;
  z-index: 0;
}

/* ── AMBIENT ── */
.ambient {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 50% 40% at 50% 0%,   rgba(255,255,255,0.03) 0%, transparent 65%),
    radial-gradient(ellipse 35% 30% at 10% 60%,  rgba(255,255,255,0.015) 0%, transparent 60%),
    radial-gradient(ellipse 40% 35% at 90% 40%,  rgba(255,255,255,0.015) 0%, transparent 60%);
}

/* ── CARD ── */
.card {
  position: relative; z-index: 1;
  width: 420px;
  background: var(--s1);
  border: 1px solid var(--e1);
  border-radius: 24px;
  padding: 32px;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04) inset,
    0 32px 80px rgba(0,0,0,0.7),
    0 8px 32px rgba(0,0,0,0.5);
  animation: cardIn 0.8s var(--out) both;
  overflow: hidden;
}

/* top shimmer line */
.card::before {
  content: '';
  position: absolute; top: 0; left: 10%; right: 10%; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
  pointer-events: none;
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(24px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── HEADER ── */
.card-header {
  text-align: center;
  margin-bottom: 28px;
  animation: fadeUp 0.7s 0.15s var(--out) both;
}

.header-mark {
  width: 40px; height: 40px;
  background: var(--t1);
  border-radius: 12px;
  display: grid; place-items: center;
  margin: 0 auto 16px;
  box-shadow: 0 0 24px rgba(238,238,237,0.15);
  animation: markIn 0.7s 0.1s var(--spring) both;
}
@keyframes markIn {
  from { opacity:0; transform: scale(0.7) rotate(-10deg); }
  to   { opacity:1; transform: scale(1) rotate(0deg); }
}
.header-mark svg {
  width: 20px; height: 20px;
  stroke: var(--bg); fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}

.card-title {
  font-family: var(--serif);
  font-size: 1.6rem;
  font-weight: 400;
  letter-spacing: -0.025em;
  color: var(--t1);
  line-height: 1.1;
  margin-bottom: 6px;
}
.card-sub {
  font-size: 0.75rem;
  color: var(--t3);
  letter-spacing: 0.01em;
}

/* ── DIVIDER ── */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--e1), transparent);
  margin: 0 -4px 24px;
  animation: fadeUp 0.6s 0.25s var(--out) both;
}

/* ── MENU BUTTONS ── */
.menu { display: flex; flex-direction: column; gap: 8px; }

.menu-btn {
  width: 100%;
  padding: 0;
  background: none; border: none;
  cursor: pointer;
  text-align: left;
  border-radius: 14px;
  transition: transform 0.2s var(--out);
}
.menu-btn:hover { transform: translateY(-1px); }
.menu-btn:active { transform: translateY(0); }

.menu-btn-inner {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 16px;
  background: var(--s2);
  border: 1px solid var(--e1);
  border-radius: 14px;
  transition: background 0.2s, border-color 0.2s, box-shadow 0.2s;
  position: relative; overflow: hidden;
}
.menu-btn-inner::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
}
.menu-btn.active .menu-btn-inner,
.menu-btn-inner:hover {
  background: var(--s3);
  border-color: var(--e2);
  box-shadow: 0 4px 20px rgba(0,0,0,0.4);
}

.menu-btn-icon {
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--s4);
  border: 1px solid var(--e2);
  display: grid; place-items: center;
  flex-shrink: 0;
  transition: background 0.2s, border-color 0.2s;
}
.menu-btn.active .menu-btn-icon {
  background: var(--t1);
  border-color: var(--t1);
}
.menu-btn-icon svg {
  width: 16px; height: 16px;
  stroke: var(--t3); fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
  transition: stroke 0.2s;
}
.menu-btn.active .menu-btn-icon svg { stroke: var(--bg); }

.menu-btn-text { flex: 1; }
.menu-btn-label {
  font-size: 0.85rem; font-weight: 600;
  color: var(--t1); letter-spacing: -0.01em;
  display: block; margin-bottom: 2px;
}
.menu-btn-desc {
  font-size: 0.68rem; color: var(--t3);
  line-height: 1.4;
}

.menu-btn-arrow {
  flex-shrink: 0;
  width: 20px; height: 20px;
  display: grid; place-items: center;
  transition: transform 0.3s var(--out), opacity 0.3s;
  opacity: 0.3;
}
.menu-btn.active .menu-btn-arrow { transform: rotate(90deg); opacity: 0.6; }
.menu-btn-arrow svg {
  width: 14px; height: 14px;
  stroke: var(--t1); fill: none;
  stroke-width: 2; stroke-linecap: round; stroke-linejoin: round;
}

/* ── EXPAND PANEL ── */
.panel {
  overflow: hidden;
  max-height: 0;
  opacity: 0;
  transform: translateY(-6px);
  transition:
    max-height 0.45s var(--out),
    opacity    0.35s var(--out),
    transform  0.35s var(--out);
}
.panel.open {
  max-height: 600px;
  opacity: 1;
  transform: translateY(0);
}

.panel-inner {
  padding: 14px 4px 4px;
}

/* ── PANEL DESC ── */
.panel-desc {
  font-size: 0.75rem;
  color: var(--t3);
  line-height: 1.65;
  margin-bottom: 14px;
  padding: 0 2px;
}

/* ── API KEYS ── */
.keys { display: flex; flex-direction: column; gap: 5px; margin-bottom: 12px; }

.key-row {
  display: flex; align-items: center;
  background: var(--bg);
  border: 1px solid var(--e1);
  border-radius: 10px;
  padding: 10px 13px;
  cursor: pointer;
  transition: background 0.18s, border-color 0.18s, box-shadow 0.18s;
  gap: 10px;
  position: relative;
  overflow: hidden;
}
.key-row:hover {
  background: var(--s2);
  border-color: var(--e2);
}
.key-row.copied {
  border-color: rgba(255,255,255,0.25);
  background: rgba(255,255,255,0.04);
}

.key-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--e3); flex-shrink: 0;
  transition: background 0.2s, box-shadow 0.2s;
}
.key-row.copied .key-dot {
  background: var(--t1);
  box-shadow: 0 0 6px rgba(238,238,237,0.5);
}

.key-text {
  flex: 1;
  font-family: var(--mono);
  font-size: 0.68rem;
  color: var(--t3);
  letter-spacing: 0.03em;
  transition: color 0.2s;
}
.key-row.copied .key-text { color: var(--t2); }

.key-badge {
  font-family: var(--mono);
  font-size: 0.58rem;
  color: var(--t4);
  padding: 2px 8px;
  background: var(--s3);
  border: 1px solid var(--e1);
  border-radius: 4px;
  transition: all 0.25s var(--out);
  flex-shrink: 0;
  white-space: nowrap;
}
.key-row.copied .key-badge {
  color: var(--t1);
  background: var(--s4);
  border-color: var(--e3);
}

/* ── PROCEED BUTTON ── */
.proceed-btn {
  width: 100%;
  height: 42px;
  background: var(--t1);
  color: var(--bg);
  border: none;
  border-radius: 11px;
  font-family: var(--sans);
  font-weight: 700;
  font-size: 0.82rem;
  letter-spacing: -0.01em;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background 0.18s, transform 0.18s, box-shadow 0.18s;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.12) inset,
    0 4px 16px rgba(0,0,0,0.5);
  position: relative; overflow: hidden;
}
.proceed-btn::after {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(255,255,255,0.07) 0%, transparent 60%);
  pointer-events: none;
}
.proceed-btn:hover {
  background: #e4e4e2;
  transform: translateY(-1px);
  box-shadow: 0 1px 0 rgba(255,255,255,0.12) inset, 0 8px 28px rgba(0,0,0,0.6);
}
.proceed-btn:active { transform: translateY(0); }

.proceed-btn svg {
  width: 14px; height: 14px;
  stroke: currentColor; fill: none;
  stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round;
}

/* ── FOOTER ── */
.card-footer {
  margin-top: 22px;
  text-align: center;
  font-family: var(--mono);
  font-size: 0.58rem; color: var(--t4);
  letter-spacing: 0.06em;
  animation: fadeUp 0.6s 0.5s var(--out) both;
}

/* ── STAGGER ── */
.menu-btn:nth-child(1) { animation: fadeUp 0.6s 0.25s var(--out) both; }
.menu-btn:nth-child(2) { animation: fadeUp 0.6s 0.32s var(--out) both; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── LAUNCH OVERLAY ── */
#launchOverlay {
  position: fixed; inset: 0; z-index: 999;
  background: var(--bg);
  opacity: 0; pointer-events: none;
  transition: opacity 0.5s var(--out);
  display: flex; align-items: center; justify-content: center;
}
#launchOverlay.show { opacity: 1; pointer-events: all; }

#launchFrame {
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  border: none; z-index: 1000;
  opacity: 0;
  transition: opacity 0.4s var(--out);
}
</style>
</head>

        </div>

<script>
/* ════ ADVANCED UI SELF-HEAL SYSTEM ════ */
(function() {

  const CLICKABLE = 'button, a, input, textarea, select, .menu-btn, .key-row, [onclick]';

  /* ── 1. Find what's ACTUALLY blocking clicks ── */
  function getBlocker(x, y) {
    const stack = document.elementsFromPoint(x, y);
    if (!stack || stack.length < 2) return null;

    const top = stack[0];
    const next = stack.find(el => el.matches && el.matches(CLICKABLE));

    if (!next) return null;

    // If clickable isn't top, something is blocking it
    if (top !== next) return top;

    return null;
  }

  /* ── 2. Disable only REAL blockers ── */
  function neutralize(el) {
    if (!el || el._neutralized) return;
    el._neutralized = true;

    el.dataset._oldPointer = el.style.pointerEvents;
    el.style.pointerEvents = 'none';

    // optional: reduce z-index instead of nuking
    if (getComputedStyle(el).zIndex > 10) {
      el.dataset._oldZ = el.style.zIndex;
      el.style.zIndex = 1;
    }
  }

  /* ── 3. Smart click rerouting ── */
  document.addEventListener('click', function(e) {
    const { clientX:x, clientY:y } = e;

    const blocker = getBlocker(x, y);

    if (blocker) {
      neutralize(blocker);

      // Retry click on actual target
      const realTarget = document.elementFromPoint(x, y);
      if (realTarget && realTarget !== blocker) {
        realTarget.click();
      }
    }
  }, true);

  /* ── 4. Fix stacking context issues ── */
  function fixStacking() {
    document.querySelectorAll(CLICKABLE).forEach(el => {
      const style = getComputedStyle(el);

      if (style.position === 'static') {
        el.style.position = 'relative';
      }

      if (!el.style.zIndex || el.style.zIndex < 5) {
        el.style.zIndex = 5;
      }

      el.style.pointerEvents = 'auto';
    });
  }

  /* ── 5. Mutation observer (auto-heal new UI) ── */
  const observer = new MutationObserver(() => {
    fixStacking();
  });

  observer.observe(document.body, {
    childList: true,
    subtree: true
  });

  /* ── 6. Fix known problem elements ── */
  function fixKnown() {
    const overlay = document.getElementById('launchOverlay');
    if (overlay) overlay.style.pointerEvents = 'none';

    const frame = document.getElementById('launchFrame');
    if (frame) {
      frame.style.pointerEvents = 'auto';
      frame.style.zIndex = 999;
    }

    const canvas = document.getElementById('canvas');
    if (canvas) canvas.style.pointerEvents = 'none';
  }

  /* ── 7. Hover-based pre-fix (feels instant) ── */
  document.addEventListener('mousemove', e => {
    const blocker = getBlocker(e.clientX, e.clientY);
    if (blocker) neutralize(blocker);
  });

  /* ── 8. Initial run + interval safety ── */
  function init() {
    fixStacking();
    fixKnown();
  }

  init();
  setInterval(init, 2000);

})();
</script>
<script>
/* ════ UNIVERSAL SMART IFRAME MANAGER ════ */
(function() {

  const managed = new WeakSet();
  const ACTIVE_Z = 1000;
  const HIDDEN_Z = -1;

  /* ── Hide a frame completely ── */
  function hideFrame(frame) {
    if (!frame || managed.has(frame)) return;
    managed.add(frame);

    // Save original style if needed
    frame.dataset._originalStyle = frame.getAttribute('style') || '';

    Object.assign(frame.style, {
      opacity: '0',
      pointerEvents: 'none',
      zIndex: HIDDEN_Z.toString(),
      position: 'fixed',
      inset: '0',
      transition: 'opacity 0.4s ease, z-index 0.4s ease'
    });
  }

  /* ── Show a frame on demand ── */
  function showFrame(frame, zIndex = ACTIVE_Z) {
    if (!frame) return;

    Object.assign(frame.style, {
      opacity: '1',
      pointerEvents: 'auto',
      zIndex: zIndex.toString()
    });
  }

  /* ── Initialize all existing iframes ── */
  function initFrames() {
    document.querySelectorAll('iframe').forEach(hideFrame);
  }

  /* ── Observe dynamically added iframes ── */
  const observer = new MutationObserver(muts => {
    muts.forEach(m => {
      m.addedNodes.forEach(node => {
        if (node.tagName === 'IFRAME') hideFrame(node);
        if (node.querySelectorAll) {
          node.querySelectorAll('iframe').forEach(hideFrame);
        }
      });
    });
  });

  observer.observe(document.documentElement, {
    childList: true,
    subtree: true
  });

  /* ── Hook into your launch() function ── */
  if (typeof window.launch === 'function') {
    const originalLaunch = window.launch;
    window.launch = function(path) {
      // Hide all managed iframes before launching
      document.querySelectorAll('iframe').forEach(hideFrame);

      originalLaunch(path);

      // Show launchFrame after loading
      const frame = document.getElementById('launchFrame');
      if (frame) {
        frame.onload = () => {
          setTimeout(() => showFrame(frame, ACTIVE_Z), 80);
        };
      }
    };
  }

  /* ── Self-healing loop ── */
  setInterval(() => {
    document.querySelectorAll('iframe').forEach(frame => {
      if (!managed.has(frame)) hideFrame(frame);

      // Ensure hidden frames stay behind
      if (frame.style.opacity === '0') frame.style.zIndex = HIDDEN_Z.toString();
    });
  }, 1000);

  /* ── Init ── */
  initFrames();

})();
</script>
